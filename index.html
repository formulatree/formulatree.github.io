<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FormulaTree — JEE Formula Revision</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <a class="logo" href="index.html">
    <div class="logo-icon">Σ</div>
    <span class="logo-text">Formula<span>Tree</span></span>
  </a>
  <nav class="header-nav">
    <a class="nav-link active" href="index.html">Home</a>
    <a class="nav-link" href="physics.html">Physics</a>
    <a class="nav-link" href="mathematics.html">Mathematics</a>
    <a class="nav-link" href="chemistry.html">Chemistry</a>
  </nav>
  <div class="search-wrap">
    <svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.5">
      <circle cx="6.5" cy="6.5" r="4.5"/><path d="M10.5 10.5l3 3"/>
    </svg>
    <input type="text" id="search" placeholder="Search all formulas… (⌘K)" autocomplete="off" oninput="handleSearch(this.value)" />
    <button class="search-clear" id="searchClear" onclick="clearSearch()">×</button>
  </div>
</header>

<nav class="breadcrumb">
  <span class="active">Home</span>
</nav>

<div id="app"></div>

<script src="data.js"></script>
<script>
let searchQuery = '';

function handleSearch(val) {
  searchQuery = val.trim().toLowerCase();
  document.getElementById('searchClear').style.display = val ? 'block' : 'none';
  if (searchQuery) renderSearch();
  else renderHome();
}

function clearSearch() {
  document.getElementById('search').value = '';
  handleSearch('');
}

function highlight(text, query) {
  if (!query) return text;
  const re = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
  return text.replace(re, '<mark>$1</mark>');
}

function renderHome() {
  const app = document.getElementById('app');
  const subjects = Object.entries(DATA);
  const totalFormulas = getAllFormulas().length;

  const cards = subjects.map(([name, d]) => {
    const chapCount = Object.keys(d.chapters).length;
    const fCount = Object.values(d.chapters).reduce((a, c) => a + c.formulas.length, 0);
    const page = SUBJECT_PAGES[name];
    return `
    <a class="subject-card fade-up" href="${page}" style="--card-accent:${d.color}; --icon-bg:${d.iconBg}">
      <div class="card-icon">${d.icon}</div>
      <h2>${name}</h2>
      <p>${d.desc}</p>
      <span class="count-badge">${chapCount} chapters · ${fCount} formulas</span>
    </a>`;
  }).join('');

  app.innerHTML = `
    <div class="hero fade-up">
      <h1>Revise <span>smarter.</span></h1>
      <p>All JEE formulas, organised by subject and chapter. Tap any formula for a full breakdown.</p>
    </div>
    <p class="section-title">Subjects</p>
    <div class="subject-grid">${cards}</div>
    <p style="text-align:center;font-size:13px;color:var(--muted2);margin-top:2rem;font-family:var(--mono);">${totalFormulas} formulas loaded · more coming soon</p>
  `;
}

function renderSearch() {
  const app = document.getElementById('app');
  const results = searchFormulas(searchQuery);

  if (results.length === 0) {
    app.innerHTML = `<div class="empty-state fade-up"><div class="e-icon">🔍</div><p>No formulas found for "<strong>${searchQuery}</strong>"</p></div>`;
    return;
  }

  const items = results.map(f => {
    const subjectColor = DATA[f.subject]?.color || 'var(--accent2)';
    const page = SUBJECT_PAGES[f.subject];
    return `
    <a class="search-result-item fade-up" href="${page}?chapter=${encodeURIComponent(f.chapter)}&id=${f.id}">
      <div style="flex:1;min-width:0;">
        <div class="sr-path">
          <span style="color:${subjectColor}">${f.subject}</span>
          <span style="color:var(--muted2)">›</span>
          <span>${f.chapter}</span>
        </div>
        <div class="sr-name">${highlight(f.name, searchQuery)}</div>
      </div>
      <span class="sr-formula">${f.equation}</span>
    </a>`;
  }).join('');

  app.innerHTML = `
    <p class="section-title fade-up">${results.length} result${results.length !== 1 ? 's' : ''} for "${searchQuery}"</p>
    <div class="search-results">${items}</div>
  `;
}

document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); document.getElementById('search').focus(); }
  if (e.key === 'Escape') { document.getElementById('search').blur(); if (searchQuery) clearSearch(); }
});

renderHome();
</script>
</body>
</html>

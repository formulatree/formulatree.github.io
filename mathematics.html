<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mathematics — FormulaTree</title>
<link rel="stylesheet" href="style.css">
<script src="data.js"></script>
<script src="popup_defs.js"></script>
</head>
<body>
<header class="header">
  <a href="index.html" class="header-logo">
    <div class="logo-icon">🌿</div>
    <span class="logo-text">Formula<span>Tree</span></span>
  </a>
  <nav class="header-nav">
    <a href="physics.html" class="nav-link">Physics</a>
    <a href="mathematics.html" class="nav-link active">Mathematics</a>
    <a href="chemistry.html" class="nav-link">Chemistry</a>
  </nav>
  <button class="search-btn" onclick="openSearch()" aria-label="Search formulas">
    <svg aria-hidden="true" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    Search <kbd aria-hidden="true">⌘K</kbd>
  </button>
</header>
<main>
  <div class="container">
    <div class="page-header">
      <div class="breadcrumb" id="breadcrumb">
        <a href="index.html">Home</a><span class="sep">/</span><span class="current">Mathematics</span>
      </div>
      <div class="page-title-row">
        <div class="page-icon" style="background:rgba(251,191,36,0.12);">∑</div>
        <div class="page-title">Mathematics</div>
      </div>
      <div class="page-sub">9 chapters · 81 formulas · Click a chapter to explore</div>
    </div>
    <div id="mainView"></div>
  </div>
</main>
<footer class="footer">
  <div class="container">FormulaTree · JEE Formula Revision</div>
</footer>
<div class="search-overlay" id="searchOverlay" onclick="closeSearchOutside(event)" role="dialog" aria-modal="true" aria-label="Search formulas">
  <div class="search-modal">
    <div class="search-input-row">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input class="search-input" id="searchInput" aria-label="Search" placeholder="Search formulas…" autocomplete="off">
    </div>
    <div class="search-results" id="searchResults" role="listbox"><div class="search-empty">Start typing to search…</div></div>
  </div>
</div>
<div class="pill-popup-overlay" id="pillPopupOverlay" onclick="closePillPopup()"></div>
<div class="pill-popup" id="pillPopup" style="display:none">
  <div class="pill-popup-title">
    <span id="pillPopupTitle"></span>
    <button class="pill-popup-close" onclick="closePillPopup()" aria-label="Close">&#x2715;</button>
  </div>
  <div class="pill-popup-body" id="pillPopupBody"></div>
</div>
<script>
const SUBJECT_KEY = 'Mathematics';
const SUBJECT_COLOR = '#fbbf24';
const SUBJECT_PAGES = { Physics: 'physics.html', Mathematics: 'mathematics.html', Chemistry: 'chemistry.html' };
let currentChapter = null;
const params = new URLSearchParams(location.search);
const initChapter = params.get('chapter');
const initId = params.get('id');

function esc(s) { return (s || '').replace(/'/g, "\\'"); }

function updateBreadcrumb(chapter) {
  const bc = document.getElementById('breadcrumb');
  bc.innerHTML = chapter
    ? `<a href="index.html">Home</a><span class="sep">/</span><a href="mathematics.html">Mathematics</a><span class="sep">/</span><span class="current">${chapter}</span>`
    : `<a href="index.html">Home</a><span class="sep">/</span><span class="current">Mathematics</span>`;
}

function renderFormulaCard(f, i) {
  const relatedHtml = (f.related || []).map(r => {
    const target = resolveGlobalRelated(r, 'Mathematics');
    if (target) return `<span class="pill linked" role="button" tabindex="0" onclick="navigateToFormula('${target.id}','${esc(target.chapter)}','${target.subject}','${target.section||''}')">&#8599; ${r}</span>`;
    if (typeof POPUP_DEFS !== 'undefined' && POPUP_DEFS[r]) return `<span class="pill info-pill" role="button" tabindex="0" data-pill="${r.replace(/"/g,'&quot;')}" title="Show definition">&#x2139; ${r}</span>`;
    return `<span class="pill">${r}</span>`;
  }).join('');
  const jeeHtml = (f.jee || []).map(j => `<span class="jee-pill">${j}</span>`).join('');
  return `<div class="formula-card fade-up" id="fc-${f.id}">
    <div class="formula-header" role="button" tabindex="0" onclick="toggleCard('${f.id}')">
      <span class="formula-num">${String(i+1).padStart(2,'0')}</span>
      <span class="formula-name">${f.name}</span>
      <span class="formula-eq-preview" style="color:${SUBJECT_COLOR};background:rgba(251,191,36,0.08)">${f.equation}</span>
      <svg class="formula-toggle" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
    <div class="formula-body">
      <div class="formula-eq-full" style="color:${SUBJECT_COLOR};border-color:rgba(251,191,36,0.2)">${f.equation}</div>
      <div class="formula-section"><div class="formula-section-label">Explanation</div><div class="formula-section-text">${f.explanation}</div></div>
      <div class="formula-section"><div class="formula-section-label">Derivation / Origin</div><div class="formula-section-text">${f.derived}</div></div>
      ${relatedHtml ? `<div class="formula-section"><div class="formula-section-label">Related Formulas</div><div class="pills-row">${relatedHtml}</div></div>` : ''}
      ${jeeHtml ? `<div class="formula-section"><div class="formula-section-label">JEE Applications</div><div class="pills-row">${jeeHtml}</div></div>` : ''}
    </div>
  </div>`;
}

function renderChapters() {
  const chapters = SUBJECTS[SUBJECT_KEY].chapters;
  document.getElementById('mainView').innerHTML = `<div class="chapters-grid">
    ${Object.entries(chapters).map(([name, data]) => `
      <div class="chapter-card fade-up" style="--chapter-color:${SUBJECT_COLOR}" onclick="openChapter('${esc(name)}')">
        <span class="chapter-name">${name}</span>
        <span class="chapter-count">${data.formulas.length}</span>
      </div>`).join('')}
  </div>`;
  updateBreadcrumb(null);
  currentChapter = null;
}

function openChapter(chName) {
  currentChapter = chName;
  const data = SUBJECTS[SUBJECT_KEY].chapters[chName];
  if (!data) return;
  updateBreadcrumb(chName);
  document.getElementById('mainView').innerHTML = `
    <button class="back-btn" onclick="renderChapters()">&#8592; Back to chapters</button>
    <div class="formulas-list">${data.formulas.map((f,i) => renderFormulaCard(f,i)).join('')}</div>`;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleCard(id) {
  const card = document.getElementById('fc-' + id);
  if (!card) return;
  const isOpen = card.classList.contains('open');
  document.querySelectorAll('.formula-card.open').forEach(c => c.classList.remove('open'));
  if (!isOpen) card.classList.add('open');
}

function openAndScroll(id) {
  setTimeout(() => {
    const card = document.getElementById('fc-' + id);
    if (card) {
      document.querySelectorAll('.formula-card.open').forEach(c => c.classList.remove('open'));
      card.classList.add('open');
      card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }, 150);
}

function navigateToFormula(id, chapter, subject, section) {
  if (subject === SUBJECT_KEY) { openChapter(chapter); openAndScroll(id); }
  else { let url = SUBJECT_PAGES[subject] + '?chapter=' + encodeURIComponent(chapter) + '&id=' + id; if (section) url += '&section=' + encodeURIComponent(section); window.location.href = url; }
}

function openSearch() { document.getElementById('searchOverlay').classList.add('open'); document.getElementById('searchInput').focus(); }
function closeSearch() { document.getElementById('searchOverlay').classList.remove('open'); document.getElementById('searchInput').value = ''; document.getElementById('searchResults').innerHTML = '<div class="search-empty">Start typing…</div>'; }
function closeSearchOutside(e) { if (e.target === document.getElementById('searchOverlay')) closeSearch(); }

document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); openSearch(); }
  if (e.key === 'Escape') { closeSearch(); closePillPopup(); }
});

document.getElementById('searchInput').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  const results = document.getElementById('searchResults');
  if (!q) { results.innerHTML = '<div class="search-empty">Start typing…</div>'; return; }
  const all = getAllFormulas();
  const matches = all.filter(f => f.name.toLowerCase().includes(q) || f.equation.toLowerCase().includes(q) || f.explanation.toLowerCase().includes(q)).slice(0,10);
  if (!matches.length) { results.innerHTML = '<div class="search-empty">No formulas found.</div>'; return; }
  const icons = { Physics: '⚛', Mathematics: '∑', Chemistry: '⚗' };
  results.innerHTML = matches.map(f => `<div class="search-result" role="option" tabindex="0" onclick="handleSearchResult('${f.subject}','${esc(f.chapter)}','${f.id}','${f.section||''}')">
    <div class="search-result-icon">${icons[f.subject]||'📖'}</div>
    <div><div class="search-result-name">${f.name}</div><div class="search-result-eq">${f.equation}</div><div class="search-result-path">${f.subject} · ${f.chapter}</div></div>
  </div>`).join('');
});

function handleSearchResult(subject, chapter, id, section) {
  closeSearch();
  if (subject === SUBJECT_KEY) { openChapter(chapter); openAndScroll(id); }
  else { let url = SUBJECT_PAGES[subject] + '?chapter=' + encodeURIComponent(chapter) + '&id=' + id; if (section) url += '&section=' + encodeURIComponent(section); window.location.href = url; }
}

function showPillPopup(name, x, y) {
  if (typeof POPUP_DEFS === 'undefined' || !POPUP_DEFS[name]) return;
  document.getElementById('pillPopupTitle').textContent = name;
  document.getElementById('pillPopupBody').textContent = POPUP_DEFS[name];
  const popup = document.getElementById('pillPopup');
  popup.style.display = 'block';
  document.getElementById('pillPopupOverlay').classList.add('open');
  const left = Math.min(x+10, window.innerWidth-356);
  const top = (y+170 > window.innerHeight) ? y-170 : y+10;
  popup.style.left = left + 'px'; popup.style.top = top + 'px';
}
function closePillPopup() {
  document.getElementById('pillPopup').style.display = 'none';
  document.getElementById('pillPopupOverlay').classList.remove('open');
}
document.addEventListener('click', e => {
  const pill = e.target.closest('.info-pill');
  if (pill) { e.stopPropagation(); showPillPopup(pill.dataset.pill, e.clientX, e.clientY); }
});

renderChapters();
if (initChapter) { openChapter(initChapter); if (initId) openAndScroll(initId); }
</script>
</body>
</html>

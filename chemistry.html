<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chemistry — FormulaTree</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <a class="logo" href="index.html">
    <div class="logo-icon">Σ</div>
    <span class="logo-text">Formula<span>Tree</span></span>
  </a>
  <nav class="header-nav">
    <a class="nav-link" href="index.html">Home</a>
    <a class="nav-link " href="physics.html">Physics</a>
    <a class="nav-link " href="mathematics.html">Mathematics</a>
    <a class="nav-link active" href="chemistry.html">Chemistry</a>
  </nav>
  <div class="search-wrap">
    <svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.5">
      <circle cx="6.5" cy="6.5" r="4.5"/><path d="M10.5 10.5l3 3"/>
    </svg>
    <input type="text" id="search" placeholder="Search formulas… (⌘K)" autocomplete="off" oninput="handleSearch(this.value)" />
    <button class="search-clear" id="searchClear" onclick="clearSearch()">×</button>
  </div>
</header>

<nav class="breadcrumb" id="breadcrumb"></nav>

<div id="app"></div>

<script src="data.js"></script>
<script>
const SUBJECT = 'Chemistry';
const CLASS_NAME = 'chemistry'; // CSS class for colour theme

// ─── STATE ──────────────────────────────────────────────────────────────
// view: 'subject' | 'chapter' | 'search'
let state = { view: 'subject', chapter: null };
let searchQuery = '';

// ─── URL PARAMS — deep-link to a chapter / formula on load ──────────────
(function() {
  const params = new URLSearchParams(location.search);
  const chap = params.get('chapter');
  const id   = params.get('id');
  if (chap) {
    state = { view: 'chapter', chapter: chap, pendingId: id || null };
  }
})();

// ─── NAVIGATION ─────────────────────────────────────────────────────────
function goSubject() {
  state = { view: 'subject', chapter: null };
  searchQuery = '';
  document.getElementById('search').value = '';
  document.getElementById('searchClear').style.display = 'none';
  history.pushState(null, '', 'chemistry.html');
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goChapter(chapterName) {
  state = { view: 'chapter', chapter: chapterName, pendingId: null };
  searchQuery = '';
  document.getElementById('search').value = '';
  document.getElementById('searchClear').style.display = 'none';
  history.pushState(null, '', `chemistry.html?chapter=${encodeURIComponent(chapterName)}`);
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function navigateToRelated(label) {
  const rec = resolveRelated(label);
  if (!rec) return;

  // Same subject — stay on this page
  if (rec.subject === SUBJECT) {
    state = { view: 'chapter', chapter: rec.chapter, pendingId: rec.id };
    searchQuery = '';
    document.getElementById('search').value = '';
    document.getElementById('searchClear').style.display = 'none';
    history.pushState(null, '', `chemistry.html?chapter=${encodeURIComponent(rec.chapter)}&id=${rec.id}`);
    render();
    openAndScroll(rec.id);
  } else {
    // Different subject — navigate to that subject's page
    const page = SUBJECT_PAGES[rec.subject];
    window.location.href = `${page}?chapter=${encodeURIComponent(rec.chapter)}&id=${rec.id}`;
  }
}

function openAndScroll(id) {
  setTimeout(() => {
    const el = document.getElementById('fi-' + id);
    if (el) {
      document.querySelectorAll('.formula-item.open').forEach(e => e.classList.remove('open'));
      el.classList.add('open');
      setTimeout(() => {
        const top = el.getBoundingClientRect().top + window.scrollY - 88;
        window.scrollTo({ top, behavior: 'smooth' });
      }, 60);
    }
  }, 80);
}

// ─── SEARCH ─────────────────────────────────────────────────────────────
function handleSearch(val) {
  searchQuery = val.trim().toLowerCase();
  document.getElementById('searchClear').style.display = val ? 'block' : 'none';
  if (searchQuery) { state.view = 'search'; }
  else { state.view = state.chapter ? 'chapter' : 'subject'; }
  render();
}

function clearSearch() {
  document.getElementById('search').value = '';
  handleSearch('');
}

function highlight(text, query) {
  if (!query) return text;
  const re = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
  return text.replace(re, '<mark>$1</mark>');
}

// ─── RENDER ─────────────────────────────────────────────────────────────
function render() {
  renderBreadcrumb();
  const app = document.getElementById('app');
  if (state.view === 'search') renderSearch(app);
  else if (state.view === 'chapter') renderChapter(app);
  else renderSubjectPage(app);
}

function renderBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  let html = `<a href="index.html">Home</a>`;
  html += `<span class="sep">›</span>`;
  if (state.view === 'chapter' || state.view === 'search') {
    html += `<a href="chemistry.html" onclick="goSubject();return false;">Chemistry</a>`;
  } else {
    html += `<span class="active">Chemistry</span>`;
  }
  if (state.view === 'chapter' && state.chapter) {
    html += `<span class="sep">›</span><span class="active">${state.chapter}</span>`;
  }
  if (state.view === 'search') {
    html += `<span class="sep">›</span><span class="active">Search results</span>`;
  }
  bc.innerHTML = html;
}

function renderSubjectPage(app) {
  const subj = DATA[SUBJECT];
  const chaps = Object.entries(subj.chapters);
  const cards = chaps.map(([name, data], i) => {
    const count = data.formulas.length;
    return `
    <div class="chapter-card fade-up" onclick="${count > 0 ? `goChapter('${name}')` : ''}">
      <span class="ch-num">0${i+1}</span>
      <span class="ch-name">${name}${count === 0 ? '<span class="coming-soon">soon</span>' : ''}</span>
      ${count > 0 ? `<span class="ch-count">${count}</span><span class="ch-arrow">›</span>` : ''}
    </div>`;
  }).join('');

  app.innerHTML = `
    <div class="subject-header fade-up">
      <h2>${subj.icon} ${SUBJECT}</h2>
      <p>${subj.desc}</p>
    </div>
    <p class="section-title">Chapters</p>
    <div class="chapter-grid">${cards}</div>
  `;
}

function renderChapter(app) {
  const subj = DATA[SUBJECT];
  const chapter = subj.chapters[state.chapter];
  if (!chapter) { goSubject(); return; }

  const formulas = chapter.formulas;
  if (formulas.length === 0) {
    app.innerHTML = `<div class="empty-state"><div class="e-icon">🚧</div><p>Coming soon!</p></div>`;
    return;
  }

  const items = formulas.map((f, i) => formulaCard(f, i)).join('');
  app.innerHTML = `
    <div class="subject-header fade-up">
      <h2 style="font-size:clamp(20px,4vw,30px)">${state.chapter}</h2>
      <p>${SUBJECT} · ${formulas.length} formulas</p>
    </div>
    <div class="formula-list ${CLASS_NAME}">${items}</div>
  `;

  // If we arrived via deep-link, open that formula
  if (state.pendingId) {
    openAndScroll(state.pendingId);
    state.pendingId = null;
  }
}

function formulaCard(f, i) {
  const jeeItems = f.jee.map(j => `<span class="jee-tag">⚡ ${j}</span>`).join('');
  const relItems = f.related.map(r => {
    const rec = resolveRelated(r);
    if (rec) {
      return `<span class="rel-pill rel-pill--linked" onclick="navigateToRelated(${JSON.stringify(r)})" title="Go to ${r}">${r} <span class="rel-arrow">↗</span></span>`;
    }
    return `<span class="rel-pill">${r}</span>`;
  }).join('');

  return `
  <div class="formula-item fade-up" id="fi-${f.id}">
    <div class="formula-header" onclick="toggleFormula('${f.id}')">
      <span class="formula-tag">${f.equation}</span>
      <span class="formula-name">${f.name}</span>
      <span class="formula-eq" aria-hidden="true">${f.equation}</span>
      <svg class="formula-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    </div>
    <div class="formula-body" id="fb-${f.id}">
      <div class="formula-inner">
        <div class="big-formula">${f.equation}</div>
        <div class="detail-grid">
          <div class="detail-card"><h4>Explanation</h4><p>${f.explanation}</p></div>
          <div class="detail-card"><h4>Derived from</h4><p>${f.derived}</p></div>
        </div>
        <div class="detail-card" style="margin-bottom:12px">
          <h4>JEE applications</h4>
          <div style="margin-top:6px">${jeeItems}</div>
        </div>
        <div class="detail-card">
          <h4>Related formulas</h4>
          <div class="related-formulas">${relItems}</div>
        </div>
      </div>
    </div>
  </div>`;
}

function toggleFormula(id) {
  const item = document.getElementById('fi-' + id);
  if (!item) return;
  const wasOpen = item.classList.contains('open');
  document.querySelectorAll('.formula-item.open').forEach(el => el.classList.remove('open'));
  if (!wasOpen) {
    item.classList.add('open');
    setTimeout(() => {
      const rect = item.getBoundingClientRect();
      if (rect.top < 70) window.scrollBy({ top: rect.top - 88, behavior: 'smooth' });
    }, 50);
  }
}

function renderSearch(app) {
  // Search across ALL subjects so you can find cross-subject formulas
  const results = searchFormulas(searchQuery);
  if (results.length === 0) {
    app.innerHTML = `<div class="empty-state fade-up"><div class="e-icon">🔍</div><p>No results for "<strong>${searchQuery}</strong>"</p></div>`;
    return;
  }

  const items = results.map(f => {
    const subjectColor = DATA[f.subject]?.color || 'var(--accent2)';
    const page = SUBJECT_PAGES[f.subject];
    const href = `${page}?chapter=${encodeURIComponent(f.chapter)}&id=${f.id}`;
    const isSame = f.subject === SUBJECT;
    return `
    <div class="search-result-item fade-up" onclick="${isSame
      ? `openSearchResult('${f.chapter}','${f.id}')`
      : `window.location.href='${href}'`}">
      <div style="flex:1;min-width:0;">
        <div class="sr-path">
          <span style="color:${subjectColor}">${f.subject}</span>
          <span style="color:var(--muted2)">›</span>
          <span>${f.chapter}</span>
        </div>
        <div class="sr-name">${highlight(f.name, searchQuery)}</div>
      </div>
      <span class="sr-formula">${f.equation}</span>
    </div>`;
  }).join('');

  app.innerHTML = `
    <p class="section-title fade-up">${results.length} result${results.length !== 1 ? 's' : ''} for "${searchQuery}"</p>
    <div class="search-results">${items}</div>
  `;
}

function openSearchResult(chapter, id) {
  state = { view: 'chapter', chapter, pendingId: id };
  searchQuery = '';
  document.getElementById('search').value = '';
  document.getElementById('searchClear').style.display = 'none';
  render();
  openAndScroll(id);
}

document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); document.getElementById('search').focus(); }
  if (e.key === 'Escape') { document.getElementById('search').blur(); if (searchQuery) clearSearch(); }
});

render();
</script>
</body>
</html>

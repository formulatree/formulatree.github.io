<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chemistry — FormulaTree</title>
<link rel="stylesheet" href="style.css">
<script src="data.js"></script>
<script src="popup_defs.js"></script>
</head>
<body>
<header class="header">
  <a href="index.html" class="header-logo">
    <div class="logo-icon">🌿</div>
    <span class="logo-text">Formula<span>Tree</span></span>
  </a>
  <nav class="header-nav">
    <a href="physics.html" class="nav-link">Physics</a>
    <a href="mathematics.html" class="nav-link">Mathematics</a>
    <a href="chemistry.html" class="nav-link active">Chemistry</a>
  </nav>
  <button class="search-btn" onclick="openSearch()">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    Search <kbd>⌘K</kbd>
  </button>
</header>
<main>
  <div class="container">
    <div class="page-header">
      <div class="breadcrumb" id="breadcrumb">
        <a href="index.html">Home</a><span class="sep">/</span><span class="current">Chemistry</span>
      </div>
      <div class="page-title-row">
        <div class="page-icon" style="background:rgba(251,113,133,0.12);">⚗</div>
        <div class="page-title">Chemistry</div>
      </div>
      <div class="page-sub" id="pageSub">Physical · Inorganic · Organic — 21 chapters · 189 formulas</div>
      <div class="section-tabs" role="tablist">
        <button class="section-tab active" id="tab-Physical" role="tab" aria-selected="true" tabindex="0" style="--tab-color:#60a5fa" onclick="switchSection('Physical')">💧 Physical</button>
        <button class="section-tab" id="tab-Inorganic" role="tab" aria-selected="false" tabindex="0" style="--tab-color:#a78bfa" onclick="switchSection('Inorganic')">🔩 Inorganic</button>
        <button class="section-tab" id="tab-Organic" role="tab" aria-selected="false" tabindex="0" style="--tab-color:#34d399" onclick="switchSection('Organic')">🌿 Organic</button>
      </div>
    </div>
    <div id="mainView"></div>
  </div>
</main>
<footer class="footer">
  <div class="container">FormulaTree · JEE Formula Revision</div>
</footer>
<div class="search-overlay" id="searchOverlay" onclick="closeSearchOutside(event)">
  <div class="search-modal">
    <div class="search-input-row">
      <svg width="16" height="16" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input class="search-input" id="searchInput" placeholder="Search chemistry formulas…" autocomplete="off">
    </div>
    <div class="search-results" id="searchResults" role="listbox"><div class="search-empty">Start typing to search…</div></div>
  </div>
</div>
<div class="pill-popup-overlay" id="pillPopupOverlay" onclick="closePillPopup()"></div>
<div class="pill-popup" id="pillPopup" style="display:none">
  <div class="pill-popup-title">
    <span id="pillPopupTitle"></span>
    <button class="pill-popup-close" onclick="closePillPopup()">&#x2715;</button>
  </div>
  <div class="pill-popup-body" id="pillPopupBody"></div>
</div>
<script>
const SECTION_COLORS = { Physical: '#60a5fa', Inorganic: '#a78bfa', Organic: '#34d399' };
const SUBJECT_PAGES = { Physics: 'physics.html', Mathematics: 'mathematics.html', Chemistry: 'chemistry.html' };
let currentSection = 'Physical';
let currentChapter = null;

const params = new URLSearchParams(location.search);
const initChapter = params.get('chapter');
const initId = params.get('id');

function esc(s) { return (s || '').replace(/'/g, "\\'"); }

function switchSection(sec) {
  currentSection = sec;
  currentChapter = null;
  document.querySelectorAll('.section-tab').forEach(t => { t.classList.remove('active'); t.setAttribute('aria-selected', 'false'); });
  const activeTab = document.getElementById('tab-' + sec);
  if(activeTab) { activeTab.classList.add('active'); activeTab.setAttribute('aria-selected', 'true'); }
  renderChapters();
}

function updateBreadcrumb(chapter) {
  const secLabel = SUBJECTS.Chemistry.sections[currentSection].label;
  const color = SECTION_COLORS[currentSection];
  const bc = document.getElementById('breadcrumb');
  if (chapter) {
    bc.innerHTML = `<a href="index.html">Home</a><span class="sep">/</span><a href="chemistry.html">Chemistry</a><span class="sep">/</span><span style="color:${color}">${secLabel}</span><span class="sep">/</span><span class="current">${chapter}</span>`;
  } else {
    bc.innerHTML = `<a href="index.html">Home</a><span class="sep">/</span><a href="chemistry.html">Chemistry</a><span class="sep">/</span><span class="current">${secLabel}</span>`;
  }
}

function renderFormulaCard(f, i) {
  const color = SECTION_COLORS[currentSection];
  const relatedHtml = (f.related || []).map(r => {
    const target = resolveGlobalRelated(r, 'Chemistry');
    if (target) return `<span class="pill linked" role="button" tabindex="0" onclick="navigateToFormula('${target.id}','${esc(target.chapter)}','${target.subject}','${target.section||''}')">&#8599; ${r}</span>`;
    if (typeof POPUP_DEFS !== 'undefined' && POPUP_DEFS[r]) return `<span class="pill info-pill" role="button" tabindex="0" data-pill="${r.replace(/"/g,'&quot;')}" title="Show definition">&#x2139; ${r}</span>`;
    return `<span class="pill">${r}</span>`;
  }).join('');
  const jeeHtml = (f.jee || []).map(j => `<span class="jee-pill">${j}</span>`).join('');
  return `<div class="formula-card fade-up" id="fc-${f.id}">
    <div class="formula-header" role="button" tabindex="0" aria-expanded="false" onclick="toggleCard('${f.id}')">
      <span class="formula-num">${String(i+1).padStart(2,'0')}</span>
      <span class="formula-name">${f.name}</span>
      <span class="formula-eq-preview" style="color:${color};background:${color}18">${f.equation}</span>
      <svg class="formula-toggle" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
    <div class="formula-body">
      <div class="formula-eq-full" style="color:${color};border-color:${color}30">${f.equation}</div>
      <div class="formula-section"><div class="formula-section-label">Explanation</div><div class="formula-section-text">${f.explanation}</div></div>
      <div class="formula-section"><div class="formula-section-label">Derivation / Origin</div><div class="formula-section-text">${f.derived}</div></div>
      ${relatedHtml ? `<div class="formula-section"><div class="formula-section-label">Related Formulas</div><div class="pills-row">${relatedHtml}</div></div>` : ''}
      ${jeeHtml ? `<div class="formula-section"><div class="formula-section-label">JEE Applications</div><div class="pills-row">${jeeHtml}</div></div>` : ''}
    </div>
  </div>`;
}

function renderChapters() {
  const secData = SUBJECTS.Chemistry.sections[currentSection];
  const color = SECTION_COLORS[currentSection];
  const chapters = secData.chapters;
  const count = Object.values(chapters).reduce((s,c) => s + c.formulas.length, 0);
  document.getElementById('pageSub').textContent = `${secData.label} — ${Object.keys(chapters).length} chapters · ${count} formulas`;
  updateBreadcrumb(null);
  document.getElementById('mainView').innerHTML = `<div class="chapters-grid">
    ${Object.entries(chapters).map(([name, data]) => `
      <div class="chapter-card fade-up" role="button" tabindex="0" style="--chapter-color:${color}" onclick="openChapter('${esc(name)}')">
        <span class="chapter-name">${name}</span>
        <span class="chapter-count" aria-label="${data.formulas.length} formulas">${data.formulas.length}</span>
      </div>`).join('')}
  </div>`;
}

function openChapter(chName) {
  currentChapter = chName;
  const data = SUBJECTS.Chemistry.sections[currentSection].chapters[chName];
  if (!data) return;
  updateBreadcrumb(chName);
  document.getElementById('pageSub').textContent = `${SUBJECTS.Chemistry.sections[currentSection].label} · ${chName}`;
  document.getElementById('mainView').innerHTML = `
    <button class="back-btn" onclick="goBack()">&#8592; Back to chapters</button>
    <div class="formulas-list">${data.formulas.map((f,i) => renderFormulaCard(f,i)).join('')}</div>`;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goBack() { currentChapter = null; renderChapters(); }

function toggleCard(id) {
  const card = document.getElementById('fc-' + id);
  if (!card) return;
  const isOpen = card.classList.contains('open');
  document.querySelectorAll('.formula-card.open').forEach(c => { c.classList.remove('open'); c.querySelector('.formula-header').setAttribute('aria-expanded', 'false'); });
  if (!isOpen) { card.classList.add('open'); card.querySelector('.formula-header').setAttribute('aria-expanded', 'true'); }
}

function openAndScroll(id) {
  setTimeout(() => {
    const card = document.getElementById('fc-' + id);
    if (card) {
      document.querySelectorAll('.formula-card.open').forEach(c => { c.classList.remove('open'); c.querySelector('.formula-header').setAttribute('aria-expanded', 'false'); });
      card.classList.add('open');
      card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }, 150);
}

function navigateToFormula(id, chapter, subject, section) {
  if (subject === 'Chemistry') {
    let targetSection = section;
    if (!targetSection) {
      for (const [sec, sdata] of Object.entries(SUBJECTS.Chemistry.sections)) {
        if (sdata.chapters[chapter]) { targetSection = sec; break; }
      }
    }
    if (targetSection && targetSection !== currentSection) switchSection(targetSection);
    openChapter(chapter);
    openAndScroll(id);
  } else {
    window.location.href = SUBJECT_PAGES[subject] + '?chapter=' + encodeURIComponent(chapter) + '&id=' + id;
  }
}

function openSearch() { document.getElementById('searchOverlay').classList.add('open'); document.getElementById('searchInput').focus(); }
function closeSearch() { document.getElementById('searchOverlay').classList.remove('open'); document.getElementById('searchInput').value = ''; document.getElementById('searchResults').innerHTML = '<div class="search-empty">Start typing…</div>'; }
function closeSearchOutside(e) { if (e.target === document.getElementById('searchOverlay')) closeSearch(); }

document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); openSearch(); }
  if (e.key === 'Escape') { closeSearch(); closePillPopup(); }
});

document.getElementById('searchInput').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  const results = document.getElementById('searchResults');
  if (!q) { results.innerHTML = '<div class="search-empty">Start typing…</div>'; return; }
  const all = getAllFormulas();
  const matches = all.filter(f => f.name.toLowerCase().includes(q) || f.equation.toLowerCase().includes(q) || f.explanation.toLowerCase().includes(q)).slice(0,10);
  if (!matches.length) { results.innerHTML = '<div class="search-empty">No formulas found.</div>'; return; }
  const icons = { Physics: '⛛', Mathematics: '∑', Chemistry: '⚗' };
  results.innerHTML = matches.map(f => `<div class="search-result" role="option" tabindex="0" onclick="handleSearchResult('${f.subject}','${esc(f.chapter)}','${f.id}','${f.section||''}')">
    <div class="search-result-icon">${icons[f.subject]||'\uD83D\uDCDA'}</div>
    <div><div class="search-result-name">${f.name}</div><div class="search-result-eq">${f.equation}</div><div class="search-result-path">${f.subject} · ${f.section ? f.section+' · ' : ''}${f.chapter}</div></div>
  </div>`).join('');
});

function handleSearchResult(subject, chapter, id, section) {
  closeSearch();
  if (subject === 'Chemistry') {
    if (section && section !== currentSection) switchSection(section);
    openChapter(chapter); openAndScroll(id);
  } else { window.location.href = SUBJECT_PAGES[subject] + '?chapter=' + encodeURIComponent(chapter) + '&id=' + id; }
}

function showPillPopup(name, x, y) {
  if (typeof POPUP_DEFS === 'undefined' || !POPUP_DEFS[name]) return;
  document.getElementById('pillPopupTitle').textContent = name;
  document.getElementById('pillPopupBody').textContent = POPUP_DEFS[name];
  const popup = document.getElementById('pillPopup');
  popup.style.display = 'block';
  document.getElementById('pillPopupOverlay').classList.add('open');
  const left = Math.min(x+10, window.innerWidth-356);
  const top = (y+170 > window.innerHeight) ? y-170 : y+10;
  popup.style.left = left + 'px'; popup.style.top = top + 'px';
}
function closePillPopup() {
  document.getElementById('pillPopup').style.display = 'none';
  document.getElementById('pillPopupOverlay').classList.remove('open');
}
document.addEventListener('click', e => {
  const pill = e.target.closest('.info-pill');
  if (pill) { e.stopPropagation(); showPillPopup(pill.dataset.pill, e.clientX, e.clientY); }
});

// Init - Safe Deep Linking Route
let startSection = params.get('section');
if (!startSection && initChapter) {
  for (const [sec, sdata] of Object.entries(SUBJECTS.Chemistry.sections)) {
    if (sdata.chapters[initChapter]) { startSection = sec; break; }
  }
}
switchSection(startSection || 'Physical');
if (initChapter) { openChapter(initChapter); if (initId) openAndScroll(initId); }
</script>
</body>
</html>
